<header class="app-header" data-testid="app-header">
      <div class="header-left">
        <p-select
          [options]="stores()"
          [(ngModel)]="selectedStoreId"
          optionLabel="name"
          optionValue="id"
          placeholder="Select store"
          (onChange)="onStoreChange($event.value)"
          styleClass="store-select"
          inputId="store-switcher-input"
          data-testid="store-switcher"
          appendTo="body"
        />
      </div>

      <div class="header-right">
        <a [routerLink]="'/profile'" class="user-name-link" pTooltip="My profile" tooltipPosition="bottom">
          {{ auth.currentUser()?.full_name }}
        </a>
        <p-button
          icon="pi pi-sign-out"
          [text]="true"
          severity="secondary"
          data-testid="logout-button"
          (onClick)="onLogout()"
          pTooltip="Sign out"
        />
      </div>
    </header>
