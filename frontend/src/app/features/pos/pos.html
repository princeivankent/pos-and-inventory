<div class="pos-layout" [class.mobile-show-cart]="mobileView() === 'cart'">
  <div class="pos-products">
    <div class="pos-toolbar">
      <app-product-search (productSelected)="addToCart($event)" />
      <p-button
        icon="pi pi-pause"
        [outlined]="true"
        severity="secondary"
        (onClick)="holdOrder()"
        [disabled]="cart.items().length === 0"
      />
      <span class="hold-badge">
        <p-button
          icon="pi pi-history"
          [outlined]="true"
          severity="secondary"
          (onClick)="recallOrder()"
          [disabled]="cart.heldOrders().length === 0"
        />
        @if (cart.heldOrders().length > 0) {
          <span class="badge">{{ cart.heldOrders().length }}</span>
        }
      </span>
    </div>
    <div class="pos-categories">
      <app-category-tabs (categoryChanged)="onCategoryChange($event)" />
    </div>
    <div class="pos-grid-area">
      <app-product-grid
        [products]="filteredProducts()"
        [cartItems]="cart.items()"
        (productSelected)="addToCart($event)"
      />
    </div>
  </div>
  <div class="pos-cart">
    <app-cart-panel
      (charge)="openPayment()"
      (addCustomer)="openCustomerDialog()"
      (addDiscount)="openDiscountDialog()"
    />
  </div>
</div>

<!-- Mobile tab switcher (visible only on small screens) -->
<div class="pos-mobile-tabs">
  <button class="pos-tab-btn" [class.active]="mobileView() === 'products'" (click)="mobileView.set('products')">
    <i class="pi pi-th-large"></i>
    <span>Products</span>
  </button>
  <button class="pos-tab-btn" [class.active]="mobileView() === 'cart'" (click)="mobileView.set('cart')">
    <i class="pi pi-shopping-cart"></i>
    <span>Cart</span>
    @if (cart.items().length > 0) {
      <span class="pos-tab-badge">{{ cart.items().length }}</span>
    }
  </button>
</div>

<app-payment-dialog
  #paymentDialog
  [totalAmount]="cart.total()"
  [processing]="loading()"
  (completed)="completeSale($event)"
/>
<app-receipt-preview
  #receiptPreview
  [sale]="lastSale()"
  [store]="currentStore()"
/>
<app-customer-search-dialog
  #customerDialog
  (customerSelected)="onCustomerSelected($event)"
/>
<app-discount-dialog
  #discountDialog
/>
