<div class="profile-page">
  <app-page-header title="My Profile" subtitle="Manage your account information and password" />

  <div class="profile-content">

    <!-- Card 1: Personal Information -->
    <div class="card profile-card">
      <div class="card-section-header">
        <div class="section-icon">
          <i class="pi pi-user"></i>
        </div>
        <div>
          <h3>Personal Information</h3>
          <p>Update your display name</p>
        </div>
      </div>

      <div class="avatar-row">
        <div class="avatar-circle">{{ initials() }}</div>
        <div class="avatar-meta">
          <span class="avatar-name">{{ currentUser()?.full_name }}</span>
          <span class="avatar-email">{{ currentUser()?.email }}</span>
        </div>
      </div>

      <div class="form-grid">
        <div class="field">
          <label for="fullName">Full name</label>
          <input
            pInputText
            id="fullName"
            type="text"
            [ngModel]="fullName()"
            (ngModelChange)="fullName.set($event)"
            name="fullName"
            placeholder="Your full name"
            class="w-full"
          />
        </div>

        <div class="field">
          <label>
            Email address
            <span
              class="email-locked"
              pTooltip="Contact support to change your email address"
              tooltipPosition="top"
            >
              <i class="pi pi-lock"></i> Read-only
            </span>
          </label>
          <input
            pInputText
            type="email"
            [value]="currentUser()?.email"
            class="w-full"
            [readonly]="true"
            tabindex="-1"
          />
        </div>
      </div>

      <div class="card-actions">
        <p-button
          label="Save changes"
          icon="pi pi-check"
          styleClass="btn-save"
          [loading]="savingProfile()"
          [disabled]="!fullName().trim()"
          (onClick)="saveProfile()"
        />
      </div>
    </div>

    <!-- Card 2: Change Password -->
    <div class="card profile-card">
      <div class="card-section-header">
        <div class="section-icon section-icon--security">
          <i class="pi pi-shield"></i>
        </div>
        <div>
          <h3>Change Password</h3>
          <p>Update your account password</p>
        </div>
      </div>

      <div class="form-grid">
        <div class="field field--full">
          <label>Current password</label>
          <p-password
            [(ngModel)]="currentPassword"
            name="currentPassword"
            placeholder="Your current password"
            [toggleMask]="true"
            [feedback]="false"
            styleClass="w-full"
            inputStyleClass="w-full"
          />
        </div>

        <div class="field">
          <label>New password</label>
          <p-password
            [(ngModel)]="newPassword"
            name="newPassword"
            placeholder="Min. 6 characters"
            [toggleMask]="true"
            [feedback]="true"
            styleClass="w-full"
            inputStyleClass="w-full"
          />
        </div>

        <div class="field">
          <label>Confirm new password</label>
          <p-password
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            placeholder="Repeat new password"
            [toggleMask]="true"
            [feedback]="false"
            styleClass="w-full"
            inputStyleClass="w-full"
          />
          @if (confirmPassword && !passwordsMatch) {
            <small class="field-error">
              <i class="pi pi-exclamation-circle"></i> Passwords do not match
            </small>
          }
        </div>
      </div>

      @if (passwordError()) {
        <div class="error-banner">
          <i class="pi pi-exclamation-circle"></i>
          <span>{{ passwordError() }}</span>
        </div>
      }

      <div class="card-actions">
        <p-button
          label="Change password"
          icon="pi pi-lock"
          styleClass="btn-save"
          [loading]="savingPassword()"
          [disabled]="!currentPassword || !newPassword || !confirmPassword || !passwordsMatch"
          (onClick)="savePassword()"
        />
      </div>
    </div>

  </div>
</div>
