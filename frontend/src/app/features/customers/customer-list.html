<app-page-header title="Customers" subtitle="Manage customer accounts and credit">
  @if (storeCtx.isAdmin()) {
    <p-button label="Add Customer" icon="pi pi-plus" data-testid="add-customer-page-button" (onClick)="openNew()" />
  }
</app-page-header>

<!-- Search -->
<div class="search-bar">
  <p-iconfield>
    <p-inputicon styleClass="pi pi-search" />
    <input
      pInputText
      type="text"
      [(ngModel)]="searchQuery"
      (input)="onSearch()"
      placeholder="Search by name or phone..."
    />
  </p-iconfield>
</div>

<!-- Customer Table -->
<div class="card" data-testid="customers-page">
  <app-customer-table
    [customers]="customers()"
    [loading]="loading()"
    [isAdmin]="storeCtx.isAdmin()"
    [hasUtangFeature]="hasUtangFeature()"
    (viewStatement)="viewStatement($event)"
    (recordPayment)="openPayment($event)"
    (edit)="editCustomer($event)"
    (delete)="confirmDelete($event)"
  />
</div>

<!-- Dialogs -->
<app-customer-form-dialog
  [(visible)]="formDialogVisible"
  [editMode]="editMode"
  [form]="form"
  [saving]="saving()"
  (save)="saveCustomer()"
/>

<app-credit-statement-dialog
  [(visible)]="statementDialogVisible"
  [statement]="statement()"
  [loading]="statementLoading()"
/>

<app-record-payment-dialog
  [(visible)]="paymentDialogVisible"
  [customer]="paymentCustomer()"
  [saving]="saving()"
  (submitPayment)="submitPayment($event)"
/>

<p-confirmDialog />
